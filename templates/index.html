<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Price Predictor 💻</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group.full-width {
            grid-column: 1 / -1;
        }
        
        label {
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        input, select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            grid-column: 1 / -1;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .result {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-radius: 10px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💻 Laptop Price Predictor</h1>
        <p class="subtitle">Get instant price predictions based on specifications</p>
        
        <form action="/predict_form" method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <label for="brand">Brand</label>
                    <select id="brand" name="brand" required>
                        <option value="ASUS">ASUS</option>
                        <option value="Lenovo">Lenovo</option>
                        <option value="HP">HP</option>
                        <option value="DELL">DELL</option>
                        <option value="acer">Acer</option>
                        <option value="MSI">MSI</option>
                        <option value="Avita">Avita</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="processor_brand">Processor Brand</label>
                    <select id="processor_brand" name="processor_brand" required>
                        <option value="Intel">Intel</option>
                        <option value="AMD">AMD</option>
                        <option value="M1">Apple M1</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="processor_name">Processor Name</label>
                    <select id="processor_name" name="processor_name" required>
                        <option value="Core i5">Core i5</option>
                        <option value="Core i3">Core i3</option>
                        <option value="Core i7">Core i7</option>
                        <option value="Core i9">Core i9</option>
                        <option value="Ryzen 5">Ryzen 5</option>
                        <option value="Ryzen 7">Ryzen 7</option>
                        <option value="Ryzen 3">Ryzen 3</option>
                        <option value="Ryzen 9">Ryzen 9</option>
                        <option value="M1">M1</option>
                        <option value="Celeron Dual">Celeron Dual</option>
                        <option value="Pentium Quad">Pentium Quad</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="ram_gb">RAM (GB)</label>
                    <select id="ram_gb" name="ram_gb" required>
                        <option value="4">4 GB</option>
                        <option value="8" selected>8 GB</option>
                        <option value="16">16 GB</option>
                        <option value="32">32 GB</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="ram_type">RAM Type</label>
                    <select id="ram_type" name="ram_type" required>
                        <option value="DDR4" selected>DDR4</option>
                        <option value="DDR5">DDR5</option>
                        <option value="LPDDR3">LPDDR3</option>
                        <option value="LPDDR4">LPDDR4</option>
                        <option value="LPDDR4X">LPDDR4X</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="ssd">SSD (GB)</label>
                    <input type="number" id="ssd" name="ssd" value="512" min="0" step="128" required>
                </div>
                
                <div class="form-group">
                    <label for="hdd">HDD (TB - enter 0 or 1)</label>
                    <input type="number" id="hdd" name="hdd" value="0" min="0" max="2" step="1" required>
                </div>
                
                <div class="form-group">
                    <label for="os">Operating System</label>
                    <select id="os" name="os" required>
                        <option value="Windows" selected>Windows</option>
                        <option value="Mac">Mac</option>
                        <option value="DOS">DOS</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="graphic_card_gb">Graphics Card (GB)</label>
                    <select id="graphic_card_gb" name="graphic_card_gb" required>
                        <option value="0">0 GB (Integrated)</option>
                        <option value="2" selected>2 GB</option>
                        <option value="4">4 GB</option>
                        <option value="6">6 GB</option>
                        <option value="8">8 GB</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="weight">Weight Category</label>
                    <select id="weight" name="weight" required>
                        <option value="Casual" selected>Casual</option>
                        <option value="ThinNlight">Thin & Light</option>
                        <option value="Gaming">Gaming</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="warranty">Warranty (Years)</label>
                    <select id="warranty" name="warranty" required>
                        <option value="0">No Warranty</option>
                        <option value="1" selected>1 Year</option>
                        <option value="2">2 Years</option>
                        <option value="3">3 Years</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="Touchscreen">Touchscreen</label>
                    <select id="Touchscreen" name="Touchscreen" required>
                        <option value="No" selected>No</option>
                        <option value="Yes">Yes</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="msoffice">MS Office</label>
                    <select id="msoffice" name="msoffice" required>
                        <option value="No" selected>No</option>
                        <option value="Yes">Yes</option>
                    </select>
                </div>
                
                <button type="submit">🔮 Predict Price</button>
            </div>
        </form>
        
        {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
        {% endif %}
    </div>
</body>
</html>
